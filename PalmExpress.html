        <div class="flex items-center space-x-2">
            <h1 class="text-lg font-black uppercase">PALM EXPRESS</h1>
        </div>
        <button id="mute-btn" onclick="toggleMute()" class="bg-amber-100 p-2 rounded-full border-2 border-amber-950">
            <i id="mute-icon" class="fa-solid fa-volume-high text-sm"></i>
        </button>
    </header>

    <main class="flex-grow flex items-center justify-center relative">
        <div id="main-menu" class="w-full max-w-sm bg-amber-100 border-4 border-amber-900 rounded-[2rem] p-6 shadow-2xl flex flex-col items-center">
            <h2 class="text-2xl font-black text-amber-950 mb-4">FFB LORRY RUSH</h2>
            <button onclick="startGame()" class="w-full bg-green-600 text-white font-black py-4 rounded-2xl border-4 border-amber-950 shadow-[0_5px_0_0_#15803d]">PLAY NOW</button>
        </div>

        <div id="game-container" class="hidden w-full h-full flex flex-col">
            <div class="absolute top-4 left-4 z-10 bg-amber-100 p-2 rounded-xl border-2 border-amber-900 text-amber-950 font-black text-xs flex space-x-4">
                <span>Speed: <span id="hud-speed">30</span> km/h</span>
                <span>Dist: <span id="hud-distance">0</span> m</span>
            </div>
            <canvas id="gameCanvas" class="w-full h-full"></canvas>
            <div id="defeat-overlay" class="absolute inset-0 bg-stone-950/90 hidden flex flex-col justify-center items-center z-40">
                <h3 class="text-3xl font-black text-red-500 mb-4">CRASHED!</h3>
                <button onclick="restartRun()" class="bg-green-600 px-8 py-3 rounded-xl font-black">TRY AGAIN</button>
            </div>
        </div>
    </main>

            isMuted = !isMuted;
            const icon = document.getElementById("mute-icon");
            const btn = document.getElementById("mute-btn");
            if (isMuted) {
                icon.className = "fa-solid fa-volume-xmark text-red-600 animate-pulse";
                btn.classList.add("border-red-500");
                Tone.Transport.stop(); // Stop music when muted
            } else {
                icon.className = "fa-solid fa-volume-high";
                btn.classList.remove("border-red-500");
                initSoundSystem();
                if (Tone.context) {
                    Tone.start();
                    Tone.Transport.start(); // Resume music when unmuted
                }
            }

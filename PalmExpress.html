<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Palm Express: FFB Lorry Rush</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        body { font-family: 'Fredoka', sans-serif; user-select: none; -webkit-user-select: none; touch-action: none; background-color: #451a03; }
        canvas { image-rendering: pixelated; touch-action: none; }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden text-slate-100">

    <header class="bg-orange-600 text-amber-950 border-b-4 border-amber-900 py-2 px-4 flex justify-between items-center shrink-0">
        <div class="flex items-center space-x-2">
            <h1 class="text-lg font-black uppercase">PALM EXPRESS</h1>
        </div>
        <button id="mute-btn" onclick="toggleMute()" class="bg-amber-100 p-2 rounded-full border-2 border-amber-950">
            <i id="mute-icon" class="fa-solid fa-volume-high text-sm"></i>
        </button>
    </header>

    <main class="flex-grow flex items-center justify-center relative">
        <div id="main-menu" class="w-full max-w-sm bg-amber-100 border-4 border-amber-900 rounded-[2rem] p-6 shadow-2xl flex flex-col items-center">
            <h2 class="text-2xl font-black text-amber-950 mb-4">FFB LORRY RUSH</h2>
            <button onclick="startGame()" class="w-full bg-green-600 text-white font-black py-4 rounded-2xl border-4 border-amber-950 shadow-[0_5px_0_0_#15803d]">PLAY NOW</button>
        </div>

        <div id="game-container" class="hidden w-full h-full flex flex-col">
            <div class="absolute top-4 left-4 z-10 bg-amber-100 p-2 rounded-xl border-2 border-amber-900 text-amber-950 font-black text-xs flex space-x-4">
                <span>Speed: <span id="hud-speed">30</span> km/h</span>
                <span>Dist: <span id="hud-distance">0</span> m</span>
            </div>
            <canvas id="gameCanvas" class="w-full h-full"></canvas>
            <div id="defeat-overlay" class="absolute inset-0 bg-stone-950/90 hidden flex flex-col justify-center items-center z-40">
                <h3 class="text-3xl font-black text-red-500 mb-4">CRASHED!</h3>
                <button onclick="restartRun()" class="bg-green-600 px-8 py-3 rounded-xl font-black">TRY AGAIN</button>
            </div>
        </div>
    </main>

    <script>
        let canvas, ctx, animationId, gameActive = false;
        let lorry = { x: 480, y: 400, targetX: 480, targetY: 400, cargo: 5 };
        let speed = 5, distance = 0, obstacles = [], scroll = 0, isMuted = false;
        let musicSynth;

        function startGame() {
            document.getElementById("main-menu").classList.add("hidden");
            document.getElementById("game-container").classList.remove("hidden");
            canvas = document.getElementById("gameCanvas");
            ctx = canvas.getContext("2d");
            canvas.width = canvas.clientWidth; canvas.height = canvas.clientHeight;
            gameActive = true;
            startMusic();
            loop();
        }

        function startMusic() {
            if (isMuted) return;
            if (!musicSynth) musicSynth = new Tone.Synth().toDestination();
            if (Tone.context.state !== 'running') Tone.start();
            new Tone.Sequence((time, note) => musicSynth.triggerAttackRelease(note, "8n", time), ["C4", "E4", "G4", "C5"], "4n").start(0);
            Tone.Transport.start();
        }

        function toggleMute() {
            isMuted = !isMuted;
            document.getElementById("mute-icon").className = isMuted ? "fa-solid fa-volume-xmark" : "fa-solid fa-volume-high";
            if (isMuted) Tone.Transport.stop(); else Tone.Transport.start();
        }

        function loop() {
            if (!gameActive) return;
            update();
            draw();
            animationId = requestAnimationFrame(loop);
        }

        function update() {
            distance += speed / 10;
            scroll = (scroll + speed) % 100;
            if (Math.random() < 0.05) obstacles.push({ x: 100 + Math.random() * (canvas.width - 200), y: -50 });
            
            obstacles.forEach((o, i) => {
                o.y += speed;
                let dx = lorry.x - o.x, dy = lorry.y - o.y;
                if (Math.sqrt(dx*dx + dy*dy) < 40) {
                    lorry.cargo--; obstacles.splice(i, 1);
                    if (lorry.cargo <= 0) { gameActive = false; document.getElementById("defeat-overlay").classList.remove("hidden"); }
                }
                if (o.y > canvas.height) obstacles.splice(i, 1);
            });
            document.getElementById("hud-distance").innerText = Math.floor(distance);
        }

        function draw() {
            ctx.fillStyle = "#166534"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#78350f"; ctx.fillRect(100, 0, canvas.width - 200, canvas.height);
            ctx.fillStyle = "white";
            ctx.fillRect(lorry.x - 20, lorry.y - 30, 40, 60);
            obstacles.forEach(o => { ctx.fillStyle = "red"; ctx.beginPath(); ctx.arc(o.x, o.y, 20, 0, Math.PI*2); ctx.fill(); });
        }

        window.addEventListener('touchmove', (e) => {
            lorry.x = e.touches[0].clientX; lorry.y = e.touches[0].clientY;
        }, {passive: false});

        function exitToMenu() { location.reload(); }
        function restartRun() { location.reload(); }
    </script>
</body>
</html>
